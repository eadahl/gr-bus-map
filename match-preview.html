<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GR Bus Map: road-matched routes (debug)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    #map { position: absolute; inset: 0; background: #fafafa; }
    .panel { position: absolute; z-index: 1; font: 12px/1.4 ui-monospace, 'IBM Plex Mono', SFMono-Regular, Menlo, monospace; letter-spacing: 0.02em; color: #111; background: #fff; border: 1px solid #111; border-radius: 2px; }
    #controls { top: 12px; left: 12px; padding: 6px 10px; display: flex; gap: 8px; }
    #controls button { font: inherit; color: inherit; background: #fff; border: 1px solid #111; border-radius: 2px; padding: 4px 8px; cursor: pointer; }
    #controls button.active { background: #111; color: #fff; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="controls" class="panel">
    <button id="raw-btn" type="button" class="active">raw GPS</button>
    <button id="matched-btn" type="button" class="active">road-matched</button>
  </div>
  <script>
    const POSITRON = 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json';
    const FALLBACK_STYLE = { version: 8, sources: {}, layers: [{ id: 'background', type: 'background', paint: { 'background-color': '#fafafa' } }] };
    const GRAND_RAPIDS = [-85.6681, 42.9634];

    let map;
    function addLayers() {
      if (!map.isStyleLoaded() || map.getSource('matched')) return;
      map.addSource('raw', { type: 'geojson', data: './data/routes.geojson' });
      map.addSource('matched', { type: 'geojson', data: './data/routes-matched-debug.geojson' });
      const firstLabel = map.getStyle().layers.find((l) => l.type === 'symbol' && /^(watername|place|roadname|poi|housenumber)/.test(l.id))?.id;

      // Raw GPS: faint, thin, for comparison.
      map.addLayer({ id: 'raw', type: 'line', source: 'raw',
        paint: { 'line-color': ['get', 'color'], 'line-width': 1.5, 'line-opacity': 0.3 } }, firstLabel);

      // Road-matched: white casing + color, like the deployed map.
      map.addLayer({ id: 'matched-casing', type: 'line', source: 'matched',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: { 'line-color': '#fff', 'line-width': ['interpolate', ['linear'], ['zoom'], 10, 3.5, 14, 6.5, 18, 13] } }, firstLabel);
      map.addLayer({ id: 'matched', type: 'line', source: 'matched',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: { 'line-color': ['get', 'color'], 'line-width': ['interpolate', ['linear'], ['zoom'], 10, 1.6, 14, 3.6, 18, 8.5] } }, firstLabel);
    }

    function buildMap(style) {
      map = new maplibregl.Map({ container: 'map', style, center: GRAND_RAPIDS, zoom: 12 });
      map.on('styledata', addLayers);
      map.on('load', addLayers);
    }
    buildMap(POSITRON);
    let fellBack = false;
    const watchdog = setTimeout(() => { if (!fellBack && !map.isStyleLoaded()) { fellBack = true; map.remove(); buildMap(FALLBACK_STYLE); } }, 5000);
    const styleWatch = setInterval(() => { addLayers(); if (map.getSource('matched')) { clearInterval(styleWatch); clearTimeout(watchdog); } }, 300);

    const wire = (btnId, layerIds) => {
      const btn = document.getElementById(btnId);
      btn.addEventListener('click', () => {
        const on = !btn.classList.contains('active');
        btn.classList.toggle('active', on);
        for (const id of layerIds) if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', on ? 'visible' : 'none');
      });
    };
    wire('raw-btn', ['raw']); wire('matched-btn', ['matched', 'matched-casing']);
  </script>
</body>
</html>
