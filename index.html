<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Grand Rapids Live Bus Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!--
    MapLibre GL JS: the open-source map rendering library. No API key needed.
    Pinned to a fixed version so the build stays reproducible.
  -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    /* Full-bleed map. The basemap's whole job is to disappear, so the page
       is nothing but the map: no chrome, no padding, near-white ground. */
    html, body { margin: 0; height: 100%; }
    #map { position: absolute; inset: 0; background: #fafafa; }

    /* Label toggle. Quiet, on-brand: black on white, monospace, hairline
       border. Sits out of the way in the top-left. */
    #labels-toggle {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1;
      padding: 6px 10px;
      font: 12px/1 ui-monospace, 'IBM Plex Mono', SFMono-Regular, Menlo, monospace;
      letter-spacing: 0.02em;
      color: #111;
      background: #fff;
      border: 1px solid #111;
      border-radius: 2px;
      cursor: pointer;
    }
    #labels-toggle:hover { background: #111; color: #fff; }
  </style>
</head>
<body>
  <div id="map"></div>
  <button id="labels-toggle" type="button">labels: on</button>

  <script type="module">
    // rapid.js: the committed fetch/normalize/poll layer for The Rapid's live
    // vehicle feed. pollVehicles(ids, onUpdate, opts) chains setTimeout so a slow
    // response never stacks, and its default fetcher requests all the given route
    // IDs in one GetAllVehiclesForRoutes call (CORS open, no proxy).
    import { pollVehicles } from './rapid.js';

    // Carto Positron: a near-white, low-contrast basemap served from CARTO's
    // public CDN. Usable without an API key. This is the labeled variant: it
    // carries place, water, and major-road names to orient the viewer.
    // The handoff calls for curated label restraint (major orienting names at
    // rest, the rest on focus); that curation is a Phase 1 refinement. Protomaps
    // is the later self-contained finish. To go back to bare landmarks, swap
    // "positron" for "positron-nolabels" below.
    const POSITRON =
      'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json';

    // Bare fallback: a near-white background and nothing else. If the Carto CDN
    // never delivers the basemap (offline, blocked, or down), we rebuild the map
    // on this bare ground so the routes are never hostage to an external
    // dependency. A bus map with no streets is still useful; a blank screen is
    // not. This matches the project aim of a self-contained, veridical build (the
    // endgame is local Protomaps).
    const FALLBACK_STYLE = {
      version: 8,
      sources: {},
      layers: [{ id: 'background', type: 'background', paint: { 'background-color': '#fafafa' } }],
    };

    // Downtown Grand Rapids, MI. MapLibre takes [longitude, latitude].
    const GRAND_RAPIDS = [-85.6681, 42.9634];

    // The map is built by buildMap so we can rebuild it from scratch if the
    // basemap never loads (see the watchdog below). `map` is reassigned there, so
    // setLabels and addRoutes close over the variable, not a fixed instance.
    let map;

    // Label toggle. Positron carries its labels as "symbol" layers, so showing or
    // hiding every symbol layer flips all map text at once, instantly. In the bare
    // fallback there are no symbol layers, so this has nothing to toggle.
    const toggle = document.getElementById('labels-toggle');
    let labelsOn = true;

    function setLabels(on) {
      if (!map.isStyleLoaded()) return;
      labelsOn = on;
      const visibility = on ? 'visible' : 'none';
      for (const layer of map.getStyle().layers) {
        if (layer.type === 'symbol') {
          map.setLayoutProperty(layer.id, 'visibility', visibility);
        }
      }
      toggle.textContent = on ? 'labels: on' : 'labels: off';
    }
    toggle.addEventListener('click', () => setLabels(!labelsOn));

    // Draw the routes as soon as the basemap STYLE is parsed, without waiting for
    // its tiles, sprites, and glyphs to finish downloading. Gating on the 'load'
    // event (which does wait for all that) means a slow basemap CDN leaves the
    // routes invisible even though our own GeoJSON loaded fine. Guarded on the
    // source, so it is idempotent across the repeated triggers and a rebuild.
    function addRoutes() {
      // Idempotent. Don't gate on isStyleLoaded(): a heavy basemap (or one glyph
      // range that never resolves) can keep it false while the style is perfectly
      // usable, leaving the routes invisible. Instead just try to add; if the style
      // isn't ready the getStyle()/addSource calls throw and the poll retries.
      if (!map || (map.getLayer && map.getLayer('routes-color'))) return;

      const routesOnly = ['!', ['has', 'kind']]; // draw only route lines as lines

      // Insert lines above roads and buildings but beneath the place/road-name
      // labels, so text stays legible on top of the routes. In Positron the
      // label cluster begins at the water/place/road-name symbols; everything
      // before that (including the lone waterway_label) is geography we want
      // the routes to sit above. In the bare fallback there are no labels, so
      // firstLabel is undefined and the routes simply sit on top of the ground.
      let firstLabel;
      try {
        firstLabel = map.getStyle().layers
          .find((l) => l.type === 'symbol' && /^(watername|place|roadname|poi|housenumber)/.test(l.id))
          ?.id;
        // The finished route geometry: GTFS parsed and road-matched, then merged,
        // hand-finished, and run through the polish pass (smooth + even-spacing + the
        // downtown hub black box). Built by scripts/polish-routes.mjs from
        // data/route-overrides.geojson. Carries route LineStrings (with real wayfinding
        // `color`) plus a `kind:'hubzone'` polygon and a `kind:'station'` marker.
        map.addSource('routes', { type: 'geojson', data: './data/routes-final.geojson' });
      } catch (e) { return; } // basemap style not ready yet; the poll retries

      // Downtown hub "black box": ~19 routes converge here too densely to show
      // truthfully, so the routes are clipped at this zone and a bus inside it reads
      // as "at the hub" rather than a fake exact position. Drawn as a quiet washed
      // area + hairline so the clipped route ends read as a station, not a glitch.
      map.addLayer({
        id: 'hub-fill', type: 'fill', source: 'routes', filter: ['==', ['get', 'kind'], 'hubzone'],
        paint: { 'fill-color': '#111', 'fill-opacity': 0.05 },
      }, firstLabel);
      map.addLayer({
        id: 'hub-outline', type: 'line', source: 'routes', filter: ['==', ['get', 'kind'], 'hubzone'],
        paint: { 'line-color': '#111', 'line-width': 1, 'line-opacity': 0.25 },
      }, firstLabel);

      // White casing underneath: a hairline border that keeps bundled routes
      // legible where many share a corridor (Division Ave, the downtown knot).
      map.addLayer({
        id: 'routes-casing',
        type: 'line',
        source: 'routes',
        filter: routesOnly,
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': '#ffffff',
          'line-width': [
            'interpolate', ['linear'], ['zoom'],
            10, 3.5,  14, 6.5,  18, 13,
          ],
        },
      }, firstLabel);

      // The real route color on top, narrower, rounded for a composed quality.
      map.addLayer({
        id: 'routes-color',
        type: 'line',
        source: 'routes',
        filter: routesOnly,
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': ['get', 'color'],
          'line-width': [
            'interpolate', ['linear'], ['zoom'],
            10, 1.6,  14, 3.6,  18, 8.5,
          ],
        },
      }, firstLabel);

      // Station marker at the hub, on top of the clipped route ends.
      map.addLayer({
        id: 'station', type: 'circle', source: 'routes', filter: ['==', ['get', 'kind'], 'station'],
        paint: { 'circle-radius': 5, 'circle-color': '#fff', 'circle-stroke-color': '#111', 'circle-stroke-width': 2 },
      }, firstLabel);

      // Live buses. The source starts empty and is fed by the poller (see below);
      // each bus is a colored dot in its route's color with a white casing so it
      // reads on top of the route lines. Added with no beforeId so the dots sit
      // ABOVE everything, labels included: the buses are the point of the map.
      map.addSource('vehicles', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      map.addLayer({
        id: 'vehicles',
        type: 'circle',
        source: 'vehicles',
        paint: {
          'circle-color': ['get', 'color'],
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 3, 14, 5, 18, 9],
          'circle-stroke-color': '#fff',
          'circle-stroke-width': ['interpolate', ['linear'], ['zoom'], 10, 1, 14, 1.5, 18, 2],
        },
      });

      // Restore the current label choice (matters after a rebuild onto bare ground).
      setLabels(labelsOn);
    }

    // (Re)create the map with a given style and wire the route-drawing triggers.
    // 'styledata' fires on the initial style parse (early, before tiles finish),
    // 'load' when the map first renders. addRoutes is idempotent, so both fire safely.
    function buildMap(style) {
      map = new maplibregl.Map({ container: 'map', style, center: GRAND_RAPIDS, zoom: 12 });
      map.on('styledata', addRoutes);
      map.on('load', addRoutes);
    }

    // Normal path: load the real basemap directly (no flash of bare ground). If
    // its style has not parsed within a few seconds, the CDN is not coming
    // (offline, blocked, hung, or a hard error), and a setStyle cannot recover a
    // map whose style never loaded. So we tear the map down and rebuild it on the
    // bare near-white ground, where the routes are guaranteed to draw. The poll
    // cancels the watchdog the moment the routes are up, whichever style won.
    buildMap(POSITRON);

    let fellBack = false;
    const watchdog = setTimeout(() => {
      if (!fellBack && !map.isStyleLoaded()) {
        fellBack = true;
        map.remove();
        buildMap(FALLBACK_STYLE);
      }
    }, 5000);

    const styleWatch = setInterval(() => {
      addRoutes();
      if (map.getSource('routes')) { clearInterval(styleWatch); clearTimeout(watchdog); }
    }, 300);

    // ── Live buses (rung 2) ─────────────────────────────────────────────────
    // routeId (string) -> route color, and the hub-zone ring, both read from the
    // same routes-final.geojson the map draws so there is one source of truth.
    const colorById = {};
    let hubRing = null;

    // Ray-casting point-in-polygon. pt and ring vertices are [lng, lat].
    function pointInRing(pt, ring) {
      if (!ring) return false;
      const [x, y] = pt;
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const [xi, yi] = ring[i], [xj, yj] = ring[j];
        const hit = (yi > y) !== (yj > y) &&
          x < ((xj - xi) * (y - yi)) / (yj - yi) + xi;
        if (hit) inside = !inside;
      }
      return inside;
    }

    // Turn a poll's worth of vehicles into dot features. A bus inside the hub
    // black box is dropped: it reads as "at the hub" (the station marker), not a
    // fake exact position. Color comes from the route; an unknown route (one we
    // don't draw) falls back to a quiet grey rather than vanishing.
    function renderVehicles(vehicles) {
      const src = map && map.getSource && map.getSource('vehicles');
      if (!src) return; // layer not built yet; the next poll (10s) will land
      const features = [];
      for (const v of vehicles) {
        if (v.lat == null || v.lon == null) continue;
        if (pointInRing([v.lon, v.lat], hubRing)) continue;
        features.push({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [v.lon, v.lat] },
          properties: { color: colorById[String(v.routeId)] || '#555', route: String(v.routeId) },
        });
      }
      src.setData({ type: 'FeatureCollection', features });
    }

    // Build the color/hub lookups from the drawn geometry, then poll those exact
    // route IDs. One GetAllVehiclesForRoutes call per sweep, every 10s.
    async function initBuses() {
      let meta;
      try {
        meta = await (await fetch('./data/routes-final.geojson')).json();
      } catch (e) {
        console.warn('bus init: could not load route metadata', e);
        return;
      }
      for (const f of meta.features) {
        if (f.properties.kind === 'hubzone') { hubRing = f.geometry.coordinates[0]; continue; }
        if (f.properties.kind) continue;
        colorById[String(f.properties.routeId)] = f.properties.color;
      }
      const ids = Object.keys(colorById);
      if (!ids.length) return;
      pollVehicles(ids, renderVehicles, {
        intervalMs: 10000,
        onError: (e) => console.warn('vehicle poll failed', e),
      });
    }
    initBuses();
  </script>
</body>
</html>
