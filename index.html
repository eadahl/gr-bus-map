<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Grand Rapids Live Bus Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!--
    MapLibre GL JS: the open-source map rendering library. No API key needed.
    Pinned to a fixed version so the build stays reproducible.
  -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    /* Full-bleed map. The basemap's whole job is to disappear, so the page
       is nothing but the map: no chrome, no padding, near-white ground. */
    html, body { margin: 0; height: 100%; }
    #map { position: absolute; inset: 0; background: #fafafa; }

    /* Label toggle. Quiet, on-brand: black on white, monospace, hairline
       border. Sits out of the way in the top-left. */
    #labels-toggle {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1;
      padding: 6px 10px;
      font: 12px/1 ui-monospace, 'IBM Plex Mono', SFMono-Regular, Menlo, monospace;
      letter-spacing: 0.02em;
      color: #111;
      background: #fff;
      border: 1px solid #111;
      border-radius: 2px;
      cursor: pointer;
    }
    #labels-toggle:hover { background: #111; color: #fff; }
  </style>
</head>
<body>
  <div id="map"></div>
  <button id="labels-toggle" type="button">labels: on</button>

  <script>
    // Carto Positron: a near-white, low-contrast basemap served from CARTO's
    // public CDN. Usable without an API key. This is the labeled variant: it
    // carries place, water, and major-road names to orient the viewer.
    // The handoff calls for curated label restraint (major orienting names at
    // rest, the rest on focus); that curation is a Phase 1 refinement. Protomaps
    // is the later self-contained finish. To go back to bare landmarks, swap
    // "positron" for "positron-nolabels" below.
    const POSITRON =
      'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json';

    // Downtown Grand Rapids, MI. MapLibre takes [longitude, latitude].
    const GRAND_RAPIDS = [-85.6681, 42.9634];

    const map = new maplibregl.Map({
      container: 'map',
      style: POSITRON,
      center: GRAND_RAPIDS,
      zoom: 12,
    });

    // Label toggle. Positron carries its labels as "symbol" layers, so showing
    // or hiding every symbol layer flips all map text at once. No style reload,
    // so it is instant. We wait for the style to finish loading before touching
    // layers, then track on/off state in one boolean.
    const toggle = document.getElementById('labels-toggle');
    let labelsOn = true;

    function setLabels(on) {
      labelsOn = on;
      const visibility = on ? 'visible' : 'none';
      for (const layer of map.getStyle().layers) {
        if (layer.type === 'symbol') {
          map.setLayoutProperty(layer.id, 'visibility', visibility);
        }
      }
      toggle.textContent = on ? 'labels: on' : 'labels: off';
    }

    map.on('load', () => {
      // Route lines, parsed offline from GTFS into static GeoJSON. Each feature
      // carries its real wayfinding `color`. See scripts/build-routes.mjs.
      map.addSource('routes', { type: 'geojson', data: './data/routes.geojson' });

      // Insert lines above roads and buildings but beneath the place/road-name
      // labels, so text stays legible on top of the routes. In Positron the
      // label cluster begins at the water/place/road-name symbols; everything
      // before that (including the lone waterway_label) is geography we want
      // the routes to sit above.
      const firstLabel = map.getStyle().layers
        .find((l) => l.type === 'symbol' && /^(watername|place|roadname|poi|housenumber)/.test(l.id))
        ?.id;

      // White casing underneath: a hairline border that keeps bundled routes
      // legible where many share a corridor (Division Ave, the downtown knot).
      map.addLayer({
        id: 'routes-casing',
        type: 'line',
        source: 'routes',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': '#ffffff',
          'line-width': [
            'interpolate', ['linear'], ['zoom'],
            10, 3.5,  14, 6.5,  18, 13,
          ],
        },
      }, firstLabel);

      // The real route color on top, narrower, rounded for a composed quality.
      map.addLayer({
        id: 'routes-color',
        type: 'line',
        source: 'routes',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: {
          'line-color': ['get', 'color'],
          'line-width': [
            'interpolate', ['linear'], ['zoom'],
            10, 1.6,  14, 3.6,  18, 8.5,
          ],
        },
      }, firstLabel);

      toggle.addEventListener('click', () => setLabels(!labelsOn));
    });
  </script>
</body>
</html>
