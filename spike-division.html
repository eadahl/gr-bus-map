<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GR Bus Map: Division road-snap spike</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    #map { position: absolute; inset: 0; background: #fafafa; }
    .panel {
      position: absolute; z-index: 1;
      font: 12px/1.4 ui-monospace, 'IBM Plex Mono', SFMono-Regular, Menlo, monospace;
      letter-spacing: 0.02em; color: #111; background: #fff; border: 1px solid #111; border-radius: 2px;
    }
    #controls { top: 12px; left: 12px; padding: 6px 10px; display: flex; gap: 8px; }
    #controls button { font: inherit; color: inherit; background: #fff; border: 1px solid #111; border-radius: 2px; padding: 4px 8px; cursor: pointer; }
    #controls button.active { background: #111; color: #fff; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="controls" class="panel">
    <button id="raw-btn" type="button" class="active">raw GPS</button>
    <button id="road-btn" type="button" class="active">road centerline</button>
    <button id="spread-btn" type="button" class="active">snapped + spread</button>
  </div>
  <script>
    const POSITRON = 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json';
    const FALLBACK_STYLE = { version: 8, sources: {}, layers: [{ id: 'background', type: 'background', paint: { 'background-color': '#fafafa' } }] };
    const GRAND_RAPIDS = [-85.6681, 42.9634];

    let map;
    function addLayers() {
      if (!map.isStyleLoaded() || map.getSource('spike')) return;
      map.addSource('spike', { type: 'geojson', data: './data/spike-division-debug.geojson' });

      const firstLabel = map.getStyle().layers
        .find((l) => l.type === 'symbol' && /^(watername|place|roadname|poi|housenumber)/.test(l.id))?.id;

      // Road centerline: a calm grey reference of the actual OSM road.
      map.addLayer({
        id: 'road', type: 'line', source: 'spike',
        filter: ['==', ['get', 'kind'], 'centerline'],
        paint: { 'line-color': '#bbbbbb', 'line-width': 2, 'line-dasharray': [2, 2] },
      }, firstLabel);

      // Raw GPS portions: the noisy source, thin and faint.
      map.addLayer({
        id: 'raw', type: 'line', source: 'spike',
        filter: ['==', ['get', 'kind'], 'raw'],
        paint: { 'line-color': ['get', 'color'], 'line-width': 1.5, 'line-opacity': 0.35 },
      }, firstLabel);

      // Snapped + spread: the road-normalized result, bold.
      map.addLayer({
        id: 'spread', type: 'line', source: 'spike',
        filter: ['==', ['get', 'kind'], 'spread'],
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint: { 'line-color': ['get', 'color'], 'line-width': ['interpolate', ['linear'], ['zoom'], 12, 2.5, 16, 6] },
      }, firstLabel);
    }

    function buildMap(style) {
      map = new maplibregl.Map({ container: 'map', style, center: GRAND_RAPIDS, zoom: 12 });
      map.on('styledata', addLayers);
      map.on('load', addLayers);
    }
    buildMap(POSITRON);
    let fellBack = false;
    const watchdog = setTimeout(() => { if (!fellBack && !map.isStyleLoaded()) { fellBack = true; map.remove(); buildMap(FALLBACK_STYLE); } }, 5000);
    const styleWatch = setInterval(() => { addLayers(); if (map.getSource('spike')) { clearInterval(styleWatch); clearTimeout(watchdog); } }, 300);

    // Layer toggles.
    const wire = (btnId, layerId) => {
      const btn = document.getElementById(btnId);
      btn.addEventListener('click', () => {
        const on = !btn.classList.contains('active');
        btn.classList.toggle('active', on);
        if (map.getLayer(layerId)) map.setLayoutProperty(layerId, 'visibility', on ? 'visible' : 'none');
      });
    };
    wire('raw-btn', 'raw'); wire('road-btn', 'road'); wire('spread-btn', 'spread');
  </script>
</body>
</html>
